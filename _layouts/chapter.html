<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div class="scroll-progress" id="scrollProgress"></div>
  <div class="decor-orb" style="width:400px;height:400px;background:rgba(139,0,0,0.12);top:-100px;left:-100px;"></div>
  <div class="decor-orb" style="width:300px;height:300px;background:rgba(255,26,26,0.06);bottom:10%;right:-50px;animation-delay:-7s;"></div>
  <div class="decor-orb" style="width:250px;height:250px;background:rgba(90,0,0,0.1);top:40%;left:-80px;animation-delay:-14s;"></div>

  {% include header.html %}
  <main class="container">
    <article class="content">
      <div class="chapter-header">
        <span class="chapter-badge">Chapter {{ page.chapter }}</span>
        <h1>{{ page.title }}</h1>
      </div>

      <div class="progress-bar">
        <div class="progress-bar-fill" style="width: {{ page.progress }}%"></div>
      </div>

      {{ content }}

      <nav class="nav-buttons">
        {% if page.prev %}
        <a href="{{ page.prev | relative_url }}" class="nav-btn prev">
          <span class="arrow">←</span>
          <span>Previous</span>
        </a>
        {% else %}
        <div></div>
        {% endif %}

        {% if page.next %}
        <a href="{{ page.next | relative_url }}" class="nav-btn next">
          <span>Next</span>
          <span class="arrow">→</span>
        </a>
        {% endif %}
      </nav>
    </article>
  </main>
  {% include footer.html %}

  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-rust.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-toml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-yaml.min.js"></script>
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
